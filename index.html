  <meta charset="UTF-8" />

  <title>Agendamento | Dr. Pedro Cunha</title>
  <meta name="description" content="Marcação de consultas com o Dr. Pedro Cunha." />
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
    }

    .artboard {
      position: relative;
      display: inline-block;
      line-height: 0;
      max-width: 100vw;
      max-height: 100vh;
    }

    .poster {
      display: block;
      width: auto;
      height: auto;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      object-position: center center;
      user-select: none;
      -webkit-user-drag: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      padding: 16px;
    }

    .button-stack {
      width: min(92%, 422px);
      display: grid;
      gap: 16px;
      pointer-events: auto;
      transform: translateY(7%);
    }

    .cta-card {
      position: relative;
      display: block;
      text-decoration: none;
      color: #182232;
      border-radius: 30px;
      background: rgba(248, 249, 251, 0.96);
      border: 1px solid rgba(195, 203, 214, 0.92);
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.10);
      overflow: hidden;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .cta-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      height: 4px;
      background: #5c7cff;
    }

    .cta-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(15, 23, 42, 0.15);
    }

    .cta-inner {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      padding: 20px 18px 20px 20px;
      line-height: normal;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      background: #e8ebf0;
      color: #5a677a;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .title {
      margin-top: 14px;
      max-width: 290px;
      color: #1b2434;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.45;
    }

    .subtitle {
      margin-top: 10px;
      color: #71819a;
      font-size: 14px;
      line-height: 1.45;
    }

    .arrow {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      background: #e9edf3;
      color: #546275;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .cta-card:hover .arrow {
      background: #dee5ee;
      transform: translateX(1px);
    }

    .arrow svg {
      width: 21px;
      height: 21px;
    }

    @media (max-width: 640px) {
      .overlay {
        padding: 10px;
      }

      .button-stack {
        width: min(96%, 410px);
        gap: 14px;
        transform: translateY(8%);
      }

      .cta-card {
        border-radius: 28px;
      }

      .cta-inner {
        gap: 14px;
        padding: 18px 18px 18px 18px;
      }

      .badge {
        min-height: 28px;
        padding: 0 12px;
        font-size: 11px;
      }

      .title {
        margin-top: 14px;
        max-width: 260px;
        font-size: 15px;
        line-height: 1.52;
      }

      .subtitle {
        margin-top: 10px;
        font-size: 12px;
      }

      .arrow {
        width: 44px;
        height: 44px;
      }

      .arrow svg {
        width: 20px;
        height: 20px;
      }
    }

      .button-stack {
        width: min(78%, 360px);
        gap: 12px;
        transform: translateY(8%);
      }

      .cta-card {
        border-radius: 24px;
      }

      .cta-inner {
        gap: 12px;
        padding: 16px 14px 16px;
      }

      .badge {
        min-height: 25px;
        padding: 0 10px;
        font-size: 10px;
      }

      .title {
        margin-top: 12px;
        font-size: 14px;
        line-height: 1.5;
      }

      .subtitle {
        margin-top: 8px;
        font-size: 11px;
      }

      .arrow {
        width: 38px;
        height: 38px;
      }

      .arrow svg {
        width: 18px;
        height: 18px;
      }
    }
  </style>
